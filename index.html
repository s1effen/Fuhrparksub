<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elektroauto Quartett – Jungheinrich</title>
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --border: #2a2a38;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --accent: #4fc3f7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #0d1b2a 0%, #1a2744 50%, #0d1b2a 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 32px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    header .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #4fc3f7, #81d4fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    header .count-badge {
      margin-left: auto;
      background: rgba(79,195,247,0.12);
      border: 1px solid rgba(79,195,247,0.3);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
    }

    .controls {
      padding: 20px 32px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(26,26,34,0.8);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 360px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      padding: 9px 12px 9px 38px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="search"]:focus { border-color: var(--accent); }

    select {
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus { border-color: var(--accent); }

    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .brand-filter {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .brand-filter.active,
    .brand-filter:hover {
      background: rgba(79,195,247,0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      padding: 32px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s;
      cursor: default;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      border-color: var(--brand-color, var(--accent));
    }

    .card-header {
      background: var(--brand-color, #1e293b);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-name {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
    }

    .rank-badge {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.25);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      object-position: center;
      background: #111118;
      display: block;
    }

    .card-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .car-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .rate-highlight {
      background: linear-gradient(135deg, rgba(79,195,247,0.08), rgba(79,195,247,0.04));
      border: 1px solid rgba(79,195,247,0.2);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .rate-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .rate-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      margin-left: auto;
    }

    .rate-unit {
      font-size: 12px;
      color: var(--muted);
    }

    .stats {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 20px 1fr auto;
      align-items: center;
      gap: 8px;
    }

    .stat-icon {
      font-size: 13px;
      text-align: center;
      opacity: 0.8;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
    }

    .stat-value {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      text-align: right;
      white-space: nowrap;
    }

    .stat-bar-wrap {
      grid-column: 2 / 4;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
      margin-top: -4px;
    }

    .stat-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--brand-color, var(--accent));
      opacity: 0.5;
      transition: width 0.4s ease;
    }

    .card-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .preis-label { font-size: 11px; color: var(--muted); }
    .preis-value { font-size: 13px; font-weight: 600; color: var(--text); }

    .faktor-pill {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
    }

    .faktor-pill.good {
      background: rgba(76,175,80,0.15);
      color: #81c784;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .grid { padding: 16px; gap: 16px; }
      .controls { padding: 14px 16px; }
      header { padding: 20px 16px; }
      header .logo { font-size: 22px; }
    }
  </style>
</head>

  {"hersteller":"KIA","typ":"EV4 Fastback 81kWh","preis":39613.45,"reichweite":612,"ladeleistung":128,"faktor":1.236,"servicerate":53.72,"monatlich":349.04,"image":"KIA_EV4_Fastback_Long_Range.jpg"},
];

const maxVals = {
  reichweite: Math.max(...cars.map(c => c.reichweite)),
  ladeleistung: Math.max(...cars.map(c => c.ladeleistung)),
  monatlich: Math.max(...cars.map(c => c.monatlich)),
};

const fmt = (n, dec=0) => n.toLocaleString('de-DE', { minimumFractionDigits: dec, maximumFractionDigits: dec });
const fmtEur = (n) => fmt(n, 2) + ' €';
const fmtMon = (n) => fmt(n, 2) + ' €/Monat';

const brands = [...new Set(cars.map(c => c.hersteller))].sort();
let activeBrand = null;
let searchQuery = '';
let sortMode = 'monatlich';

function buildBrandFilters() {
  const container = document.getElementById('brandFilters');
  const all = document.createElement('button');
  all.className = 'brand-filter active';
  all.textContent = 'Alle';
  all.onclick = () => { activeBrand = null; updateFilters(); };
  container.appendChild(all);

  brands.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'brand-filter';
    btn.textContent = b;
    btn.dataset.brand = b;
    btn.onclick = () => { activeBrand = b; updateFilters(); };
    container.appendChild(btn);
  });
}

function updateFilters() {
  document.querySelectorAll('.brand-filter').forEach(btn => {
    btn.classList.toggle('active',
      btn.textContent === 'Alle' ? activeBrand === null : btn.dataset.brand === activeBrand
    );
  });
  renderCards();
}

function sortedFiltered() {
  let list = cars.filter(c => {
    const q = searchQuery.toLowerCase();
    const match = c.hersteller.toLowerCase().includes(q) || c.typ.toLowerCase().includes(q);
    const brandOk = !activeBrand || c.hersteller === activeBrand;
    return match && brandOk;
  });

  switch (sortMode) {
    case 'monatlich':       list.sort((a,b) => a.monatlich - b.monatlich); break;
    case 'reichweite_desc': list.sort((a,b) => b.reichweite - a.reichweite); break;
    case 'preis':           list.sort((a,b) => a.preis - b.preis); break;
    case 'ladeleistung_desc': list.sort((a,b) => b.ladeleistung - a.ladeleistung); break;
    case 'alpha':           list.sort((a,b) => (a.hersteller+a.typ).localeCompare(b.hersteller+b.typ)); break;
  }
  return list;
}

function renderCards() {
  const grid = document.getElementById('carGrid');
  const list = sortedFiltered();

  document.getElementById('countBadge').textContent = list.length + ' Fahrzeuge';

  if (list.length === 0) {
    grid.innerHTML = '<div class="no-results">Keine Fahrzeuge gefunden.</div>';
    return;
  }

  grid.innerHTML = list.map((c, i) => {
    const color = brandColors[c.hersteller] || '#2a2a38';
    const rPct = c.reichweite ? (c.reichweite / maxVals.reichweite * 100).toFixed(1) : 0;
    const lPct = c.ladeleistung ? (c.ladeleistung / maxVals.ladeleistung * 100).toFixed(1) : 0;
    const mPct = (c.monatlich / maxVals.monatlich * 100).toFixed(1);
    const faktorGood = c.faktor < 1.0;

    return `
    <div class="card" style="--brand-color:${color}">
      <div class="card-header">
        <span class="brand-name">${c.hersteller}</span>
        <span class="rank-badge">#${i + 1}</span>
      </div>
      <img class="card-image" src="car_images/${c.image}" alt="${c.hersteller} ${c.typ}" loading="lazy" />
      <div class="card-body">
        <div class="car-name">${c.typ}</div>

        <div class="rate-highlight">
          <span class="rate-label">Monatliche Rate</span>
          <span class="rate-value">${fmt(c.monatlich, 2)}</span>
          <span class="rate-unit">€/Mon.</span>
        </div>

        <div class="stats">
          <div class="stat-row">
            <span class="stat-icon">🔋</span>
            <span class="stat-label">WLTP-Reichweite</span>
            <span class="stat-value">${c.reichweite > 0 ? c.reichweite + ' km' : '–'}</span>
          </div>
          ${c.reichweite > 0 ? `<div class="stat-row"><span></span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${rPct}%"></div></div></div>` : ''}

          <div class="stat-row">
            <span class="stat-icon">⚡</span>
            <span class="stat-label">DC-Ladeleistung</span>
            <span class="stat-value">${c.ladeleistung > 0 ? c.ladeleistung + ' kW' : '–'}</span>
          </div>
          ${c.ladeleistung > 0 ? `<div class="stat-row"><span></span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${lPct}%"></div></div></div>` : ''}

          <div class="stat-row">
            <span class="stat-icon">🔧</span>
            <span class="stat-label">Servicerate</span>
            <span class="stat-value">${fmt(c.servicerate, 2)} €/Mon.</span>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <div>
          <div class="preis-label">Netto-Listenpreis</div>
          <div class="preis-value">${fmt(c.preis, 0)} €</div>
        </div>
        <div class="faktor-pill ${faktorGood ? 'good' : ''}">Faktor ${fmt(c.faktor, 3)}</div>
      </div>
    </div>`;
  }).join('');
}

buildBrandFilters();
renderCards();

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderCards();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortMode = e.target.value;
  renderCards();
});
</script>
</body>
</html>
